<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convert - MudraVaani</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    #bigVideoBox {
  width: 100%;
  height: 88vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #e5e7eb !important; 
}
    #islFrame {
      width: 98%;
      height: 100%;
      border: none;
      background: black;
      border-radius: 15px;
      transition: background 0.2s ease;
    }

    
  </style>
</head>

<body class="bg-gray-100 text-gray-900">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center px-10 py-4 bg-gray-900 text-white sticky top-0 z-50">
    <div class="flex items-center space-x-3">
      <img src="images/logo2.png" class="w-12 h-12" />
      <span class="text-xl font-bold text-teal-300">MudraVaani</span>
    </div>

    <div class="space-x-6">
      <a href="index.html" class="hover:text-teal-300">Home</a>
      <a href="convert.html" class="text-teal-300 font-semibold">Convert</a>
      <a href="learn.html" class="hover:text-teal-300">Learn Sign</a>
      <a href="videos.html" class="hover:text-teal-300">Videos</a>
      <a
          href="live_call.html"
          class="hover:text-teal-300 transition-colors duration-300"
          >Live Call</a
        >
      <a href="feedback.html" class="hover:text-teal-300">Feedback</a>
    </div>
  </nav>


  <section class="flex h-[calc(100vh-120px)]">


    <div class="w-1/3 p-6 bg-white border-r space-y-6 overflow-y-auto">


      <div>
        <label class="font-bold">English Translated Text</label>
        <textarea id="TranslationText" class="w-full border p-2 rounded mt-2" rows="3"></textarea>
      </div>


      <div>
        <label class="font-bold">
          Marathi Speech Recognition: <span id="speechStatus">off</span>
        </label>

        <div class="flex space-x-2 mt-2">
          <button id="micOn" class="bg-blue-500 text-white px-4 py-2 rounded">Mic On</button>
          <button id="micOff" class="bg-blue-500 text-white px-4 py-2 rounded">Mic Off</button>
          <button id="clear" class="bg-blue-500 text-white px-4 py-2 rounded">Clear</button>
        </div>

        <textarea id="speechInput" class="w-full border p-2 rounded mt-2" placeholder="Marathi speech..." rows="3"></textarea>
      </div>

      <!-- Start Animation from English -->
      <button id="startAnim2" class="bg-green-500 text-white px-6 py-2 rounded w-full">
        Start Animation
      </button>

      <!-- Marathi Text Input -->
      <div>
        <label class="font-bold">Marathi Text Input</label>
        <textarea id="textInput" class="w-full border p-2 rounded mt-2" placeholder="Enter Marathi text..." rows="3"></textarea>
      </div>

      <!-- Start Video from Marathi -->
      <button id="startVideo" class="bg-purple-600 text-white px-6 py-2 rounded w-full">
        ▶ Start Video
      </button>

      <!-- TABLE (SIDE PANEL) -->
      <div class="mt-6">
        <h3 class="font-bold text-lg mb-2">Model Comparison</h3>
        <table class="w-full text-sm border">
          <thead class="bg-gray-200">
            <tr>
              <th class="border px-2 py-1">Model</th>
              <th class="border px-2 py-1">Gloss</th>
              <th class="border px-2 py-1">Score</th>
            </tr>
          </thead>
          <tbody id="modelTable"></tbody>
        </table>
      </div>

    </div>

    <!-- RIGHT SIDE – VIDEO OUTPUT -->
    <div class="flex-1 bg-gray-200 flex flex-col items-center p-4 space-y-3">

      <div class="flex justify-between items-center w-full">
        <div class="space-y-1">
          <h3 class="font-bold text-lg text-gray-700">ISL Video Output</h3>
          <div class="text-sm text-gray-700">
            <span id="currentWordLabel" class="font-semibold">No sequence loaded</span>
          </div>
        </div>

        <div class="flex items-center space-x-2">
          <button id="prevBtn" class="bg-gray-700 text-white px-3 py-1 rounded text-sm">⏮ Prev</button>
          <button id="nextBtn" class="bg-gray-700 text-white px-3 py-1 rounded text-sm">Next ⏭</button>

          <button id="openComparison"
            class="bg-orange-500 text-white px-4 py-2 rounded shadow hover:bg-orange-600 transition">
            📊 Model Comparison
          </button>
        </div>
      </div>

      <!-- Single iframe player -->
      <div id="bigVideoBox">
        <iframe id="islFrame" allow="autoplay; fullscreen"></iframe>
      </div>
    </div>
  </section>

  <!-- POPUP MODAL -->
<div id="comparisonModal"
  class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex justify-center items-center hidden z-50">

  <div class="bg-white w-[80%] max-w-4xl p-8 rounded-2xl shadow-2xl relative max-h-[90vh] overflow-y-auto">

    <!-- CLOSE BUTTON -->
    <button id="closeComparison"
      class="absolute top-4 right-4 text-2xl font-bold text-gray-500 hover:text-black">
      ✖
    </button>

    <!-- TITLE -->
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">
      Model Comparison Dashboard
    </h2>

    <!-- TABLE -->
    <div class="overflow-x-auto shadow rounded-lg mb-10">
      <table class="min-w-full text-sm border border-gray-300">
        <thead class="bg-gray-100 text-gray-800">
          <tr>
            <th class="border px-4 py-2 font-semibold">Model</th>
            <th class="border px-4 py-2 font-semibold">Gloss</th>
            <th class="border px-4 py-2 font-semibold">Score</th>
          </tr>
        </thead>
        <tbody id="popupTable" class="text-center"></tbody>
      </table>
    </div>

    <!-- GRAPH SECTION -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 justify-items-center">

      <!-- BAR CHART -->
      <div class="w-[100%] max-w-[380px] h-[300px] p-4 bg-gray-50 shadow rounded-xl flex justify-center items-center">
        <canvas id="barChart" class="w-full h-full"></canvas>
      </div>

      <!-- PIE CHART -->
      <div class="w-[100%] max-w-[380px] h-[300px] p-4 bg-gray-50 shadow rounded-xl flex justify-center items-center">
        <canvas id="pieChart" class="w-full h-full"></canvas>
      </div>

    </div>

  </div>
</div>


<script>
  /* =============== GLOBALS =============== */
  let avatarLetters = {};      // A–Z → avatar videos
  let modelResults = [];       // for table/chart
  let barChart, pieChart;

  // Video sequence: [{ label: "WHAT", url: "..." }, { label:"NAME", url:"..." }, {label:"NAME:N",url:"..."} ...]
  let currentSequence = [];
  let currentIndex = 0;


  /* =============== LOAD LETTER VIDEO MAP =============== */
  fetch("learn_map.json")
    .then(res => res.json())
    .then(data => avatarLetters = data)
    .catch(err => console.error("Error loading learn_map.json:", err));


  /* =============== SIMPLE IFRAME PLAYER (NO AUTO NEXT) =============== */
  function showCurrent() {
    const frame = document.getElementById("islFrame");
    const labelSpan = document.getElementById("currentWordLabel");

    if (!currentSequence.length) {
      frame.src = "";
      labelSpan.textContent = "No sequence loaded";
      return;
    }

    const item = currentSequence[currentIndex];
    if (item.type === "letters") {
    frame.style.background = "transparent";
    frame.classList.add("letterZoom");
    playLetters(item.letters);
} else {
    frame.style.background = "black";
    frame.classList.remove("letterZoom");
    frame.src = item.url;
}
       // direct preview link
    labelSpan.textContent = `Clip ${currentIndex + 1}/${currentSequence.length} → ${item.label}`;
  }

  function buildSequenceFromBest(best) {
    currentSequence = [];
    currentIndex = 0;

    // 1) Add mapped gloss videos in order
    best.videos.forEach(v => {
      currentSequence.push({
        label: v.gloss,
        url: v.url
      });
    });

    // 2) For each missing word → spell with avatar letters
    best.missing.forEach(word => {
    const upper = word.toUpperCase();

    // Group object for this missing word
    let group = {
        label: word,
        type: "letters",
        letters: []
    };

    for (let ch of upper) {
        if (avatarLetters[ch]) {
            group.letters.push(avatarLetters[ch]);
        }
    }

 
    if (group.letters.length > 0) {
        currentSequence.push(group);
    }
});

    if (!currentSequence.length) {
      alert("No matching videos or letters found for this gloss.");
    }

    showCurrent();
  }

  // Prev / Next controls
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("prevBtn").onclick = () => {
      if (!currentSequence.length) return;
      if (currentIndex > 0) {
        currentIndex--;
        showCurrent();
      }
    };

    document.getElementById("nextBtn").onclick = () => {
      if (!currentSequence.length) return;
      if (currentIndex < currentSequence.length - 1) {
        currentIndex++;
        showCurrent();
      }
    };
  });

  async function playLetters(urls) {
    const frame = document.getElementById("islFrame");
    frame.style.background = "transparent";
frame.classList.add("letterZoom");
    for (let u of urls) {
        frame.src = u;
        await new Promise(res => setTimeout(res, 2500));
    }
}

  /* SPEECH RECOGNITION */
  window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = "mr-IN";

  const status = document.getElementById("speechStatus");

  document.getElementById("micOn").onclick = () => {
    recognition.start();
    status.innerText = "Listening...";
    status.style.color = "green";
  };

  document.getElementById("micOff").onclick = () => {
    recognition.stop();
    status.innerText = "off";
    status.style.color = "red";
  };

  document.getElementById("clear").onclick = () => {
    document.getElementById("speechInput").value = "";
    document.getElementById("TranslationText").value = "";
  };

  recognition.onresult = async (event) => {
    const marathi = event.results[0][0].transcript;
    document.getElementById("speechInput").value = marathi;

    let res = await fetch(
      "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=" +
      encodeURIComponent(marathi)
    );
    let data = await res.json();
    document.getElementById("TranslationText").value = data[0][0][0];

    status.innerText = "Translated ✔";
    status.style.color = "blue";
  };


  /* =============== BACKEND NLP CALL =============== */
  async function runAllNLP(english) {
    const response = await fetch("https://127.0.0.1:5001", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: english })
    });
    return response.json();
  }


  /* =============== MODEL TABLE + POPUP =============== */
  function updateModelTable(results, bestModel) {
    modelResults = results;

    let table = "";
    results.forEach(r => {
      table += `
        <tr class="${r.model === bestModel.model ? 'bg-green-200 font-bold' : ''}">
          <td class="border px-2 py-1">${r.model}</td>
          <td class="border px-2 py-1">${r.gloss.join(" ")}</td>
          <td class="border px-2 py-1">${(r.score * 100).toFixed(2)}%</td>
        </tr>
      `;
    });

    document.getElementById("modelTable").innerHTML = table;
  }

  document.getElementById("openComparison").onclick = () => {
    document.getElementById("comparisonModal").classList.remove("hidden");
    loadPopup();
  };

  document.getElementById("closeComparison").onclick = () => {
    document.getElementById("comparisonModal").classList.add("hidden");
  };

  function loadPopup() {
    let tbody = "";
    modelResults.forEach(r => {
      tbody += `
        <tr>
          <td class="border px-2 py-1 font-semibold">${r.model}</td>
          <td class="border px-2 py-1">${r.gloss.join(" ")}</td>
          <td class="border px-2 py-1">${(r.score * 100).toFixed(2)}%</td>
        </tr>`;
    });

    document.getElementById("popupTable").innerHTML = tbody;
    loadCharts();
  }

  function loadCharts() {
  const labels = modelResults.map(r => r.model);
  const scores = modelResults.map(r => r.score * 100);

  if (barChart) barChart.destroy();
  if (pieChart) pieChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Model Score (%)",
        data: scores,
        backgroundColor: ["#0ea5e9", "#22c55e", "#f97316", "#6366f1"]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: scores,
        backgroundColor: ["#0ea5e9", "#22c55e", "#f97316", "#6366f1"]
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "bottom",
          labels: { padding: 15 }
        }
      }
    }
  });
}


  /* =============== BUTTON FLOWS =============== */


  document.getElementById("startAnim2").onclick = async () => {
    let english = document.getElementById("TranslationText").value.trim();
    if (!english) return alert("Enter or speak English text!");

    let data = await runAllNLP(english);
    updateModelTable(data.results, data.best);


    buildSequenceFromBest(data.best);
  };


  document.getElementById("startVideo").onclick = async () => {
    let marathi = document.getElementById("textInput").value.trim();
    if (!marathi) return alert("Enter Marathi text!");

    let r = await fetch(
      "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=" +
      encodeURIComponent(marathi)
    );
    let data = await r.json();
    let english = data[0][0][0];

    document.getElementById("TranslationText").value = english;

    let nlpData = await runAllNLP(english);
    updateModelTable(nlpData.results, nlpData.best);

    buildSequenceFromBest(nlpData.best);
  };

</script>

</body>
</html>
